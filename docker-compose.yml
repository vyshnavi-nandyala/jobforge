version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobforge
      POSTGRES_PASSWORD: jobforge123
      POSTGRES_DB: jobforgedb
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jobforge -d jobforgedb']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
